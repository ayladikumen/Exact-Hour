<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B0B0D" />
<title>Exact Hour</title>
<style>
  :root {
    --bg: #0B0B0D;
    --surface: #16161A;
    --surface2: #24242B;
    --accent: #FFB020;
    --text: #EDEDED;
    --muted: #8A8A93;
    --running: #4ADE80;
    --finished: #FF6B3D;
    --outline: #3A3A42;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100%;
    padding: 18px 20px calc(18px + env(safe-area-inset-bottom));
    max-width: 520px; margin: 0 auto;
  }
  header {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .wordmark { font-size: 14px; font-weight: 700; letter-spacing: 3px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface); border: none; color: var(--text);
    border-radius: 999px; padding: 8px 13px; font-size: 12.5px; cursor: pointer;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .clock { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .state { font-size: 13px; font-weight: 600; letter-spacing: 5px; color: var(--muted); }
  .time {
    font-family: "SF Mono", "Cascadia Mono", Consolas, "Roboto Mono", monospace;
    font-weight: 700; letter-spacing: 2px; line-height: 1;
    font-size: clamp(56px, 22vw, 104px);
  }
  .hint { color: var(--muted); font-size: 13px; text-align: center; min-height: 18px; }
  .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; }
  .row > button { flex: 1; }
  .chip {
    background: var(--surface); color: var(--text); border: none; border-radius: 999px;
    height: 46px; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity .12s;
  }
  .chip:disabled { color: var(--muted); opacity: .55; cursor: default; }
  .chip:active:not(:disabled) { background: var(--surface2); }
  .primary {
    background: var(--accent); color: #1A1206; border: none; border-radius: 18px;
    height: 64px; font-size: 18px; font-weight: 800; letter-spacing: 3px; cursor: pointer;
    transition: filter .12s;
  }
  .primary:disabled { filter: grayscale(.6) brightness(.7); cursor: default; }
  .primary:active:not(:disabled) { filter: brightness(.92); }
  .reset {
    background: none; border: none; color: var(--muted); font-size: 13px; letter-spacing: 2px;
    padding: 8px; cursor: pointer;
  }
  .reset:disabled { opacity: .4; cursor: default; }
  dialog {
    background: var(--surface); color: var(--text); border: 1px solid var(--outline);
    border-radius: 16px; padding: 22px; width: min(360px, 90vw);
  }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  dialog h3 { margin: 0 0 6px; font-size: 17px; }
  dialog p { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
  dialog label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 5px; }
  dialog input {
    width: 100%; background: var(--bg); border: 1px solid var(--outline); color: var(--text);
    border-radius: 10px; padding: 11px 12px; font-size: 15px;
  }
  .dlg-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .dlg-actions button { background: none; border: none; color: var(--accent); font-size: 14px; font-weight: 600; padding: 8px 12px; cursor: pointer; }
</style>
</head>
<body>
  <header>
    <span class="wordmark">EXACT HOUR</span>
    <button class="pill" id="conn" title="Connection settings">
      <span class="dot" id="dot"></span><span id="connlabel">connecting…</span>
    </button>
  </header>

  <main class="clock">
    <div class="state" id="state">READY</div>
    <div class="time" id="time">--:--</div>
    <div class="hint" id="hint"></div>
  </main>

  <section class="controls">
    <div class="row" id="presets">
      <button class="chip" data-min="5">5m</button>
      <button class="chip" data-min="15">15m</button>
      <button class="chip" data-min="25">25m</button>
      <button class="chip" data-min="45">45m</button>
    </div>
    <div class="row" id="adjust">
      <button class="chip" data-delta="-5">−5</button>
      <button class="chip" data-delta="-1">−1</button>
      <button class="chip" data-delta="1">+1</button>
      <button class="chip" data-delta="5">+5</button>
    </div>
    <button class="primary" id="primary" disabled>START</button>
    <button class="reset" id="reset" disabled>RESET</button>
  </section>

  <dialog id="settings">
    <h3>Clock connection</h3>
    <p>Leave as-is if this page is served by the clock itself. To point at a
       different clock, enter its IP and port.</p>
    <label for="host">Base URL or IP</label>
    <input id="host" placeholder="192.168.1.50:8080" inputmode="url" />
    <div class="dlg-actions">
      <button id="cancel">Cancel</button>
      <button id="save">Connect</button>
    </div>
  </dialog>

<script>
(() => {
  "use strict";
  // Default to the SAME origin that served this page (the clock or the demo).
  // Stored override lets you point a standalone copy at any clock.
  let base = localStorage.getItem("eh_base") || "";
  const $ = (id) => document.getElementById(id);
  const STATE_COLOR = { RUNNING: "var(--running)", PAUSED: "var(--accent)",
                        FINISHED: "var(--finished)", IDLE: "var(--muted)" };
  const STATE_LABEL = { RUNNING: "FOCUS", PAUSED: "PAUSED", FINISHED: "FINISHED", IDLE: "READY" };

  function url(path) { return (base || "") + path; }

  async function api(method, path, body) {
    const opts = { method };
    if (body) { opts.headers = { "Content-Type": "application/json" }; opts.body = JSON.stringify(body); }
    const res = await fetch(url(path), opts);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  let connected = false;
  function render(s) {
    connected = true;
    $("dot").style.background = STATE_COLOR[s.state] || "var(--muted)";
    $("connlabel").textContent = base ? base.replace(/^https?:\/\//, "") : "online";
    $("state").textContent = STATE_LABEL[s.state] || s.state;
    $("state").style.color = STATE_COLOR[s.state] || "var(--muted)";
    $("time").textContent = s.display;
    $("hint").textContent = "";
    const editable = s.state === "IDLE" || s.state === "PAUSED";
    document.querySelectorAll("#presets .chip, #adjust .chip").forEach(b => b.disabled = !editable);
    const labels = { RUNNING: "PAUSE", PAUSED: "RESUME", FINISHED: "NEW", IDLE: "START" };
    $("primary").textContent = labels[s.state] || "START";
    $("primary").disabled = false;
    $("reset").disabled = s.state === "IDLE";
  }

  function showOffline(msg) {
    connected = false;
    $("dot").style.background = "var(--finished)";
    $("connlabel").textContent = "offline";
    $("hint").textContent = "Can't reach the clock — " + msg;
    $("primary").disabled = true;
    $("reset").disabled = true;
    document.querySelectorAll(".chip").forEach(b => b.disabled = true);
  }

  async function refresh() {
    try { render(await api("GET", "/api/status")); }
    catch (e) { showOffline(e.message); }
  }

  // Optimistic: fire the command, then immediately show the returned status.
  async function cmd(method, path, body) {
    try { render(await api(method, path, body)); }
    catch (e) { showOffline(e.message); }
  }

  $("primary").addEventListener("click", () => cmd("POST", "/api/toggle"));
  $("reset").addEventListener("click", () => cmd("POST", "/api/reset"));
  document.querySelectorAll("#presets .chip").forEach(b =>
    b.addEventListener("click", () => cmd("POST", "/api/set", { minutes: +b.dataset.min, seconds: 0 })));
  document.querySelectorAll("#adjust .chip").forEach(b =>
    b.addEventListener("click", () => cmd("POST", "/api/adjust", { delta: +b.dataset.delta })));

  // Settings dialog
  const dlg = $("settings");
  $("conn").addEventListener("click", () => { $("host").value = base; dlg.showModal(); });
  $("cancel").addEventListener("click", () => dlg.close());
  $("save").addEventListener("click", () => {
    let v = $("host").value.trim();
    if (v && !/^https?:\/\//.test(v)) v = "http://" + v;
    base = v.replace(/\/+$/, "");
    localStorage.setItem("eh_base", base);
    dlg.close();
    refresh();
  });

  refresh();
  setInterval(refresh, 500);
})();
</script>
</body>
</html>
